<style>
  :root{
    --sky-top:#5AA0D8;
    --sky-mid:#2B8CCF;
    --sky-deep:#0D7ABE;
    --ink:#0b4b78;
    --white:#ffffff;
    --round:"Jua","Malgun Gothic",sans-serif;
    --body:"Gowun Dodum","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--body);
    color:var(--white);
    min-height:100vh;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 45%,var(--sky-deep) 100%);
    overflow-x:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 20px 80px;
  }

  /* ── 반짝이는 별 ── */
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{
    position:absolute;color:#fff;opacity:0;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.9));
    animation:twinkle var(--dur,4s) ease-in-out infinite;
    animation-delay:var(--delay,0s);
  }
  @keyframes twinkle{
    0%,100%{opacity:0;transform:scale(.6) rotate(0deg);}
    50%{opacity:.95;transform:scale(1) rotate(20deg);}
  }

  .card.show{animation:rise .5s ease forwards;}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .card .set-label{

  .q:last-child{margin-bottom:0;}
  .q .no{
    flex:none;width:34px;height:34px;border-radius:50%;

    color:#fff;font-family:var(--round);font-size:18px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(11,75,120,.3);
  }
  .q .tag{display:block;font-family:var(--round);font-size:12px;color:var(--sky-mid);
    margin-bottom:4px;letter-spacing:.5px;}

  .placeholder{
    text-align:center;color:#eaf6ff;opacity:.85;font-size:16px;
    padding:20px;line-height:1.7;

  .again{

    padding:10px 24px;cursor:pointer;transition:background .18s ease;
  }
  .again:hover{background:rgba(255,255,255,.34);}

  footer{position:relative;z-index:2;margin-top:auto;padding-top:36px;
    font-size:12px;color:#eaf6ff;opacity:.7;text-align:center;}

  // 번호 버튼
  const picker=document.getElementById('picker');
  const buttons=[];
  for(let i=0;i<5;i++){
    const b=document.createElement('button');
    b.className='num';b.textContent=i+1;
    b.addEventListener('click',()=>select(i));
    picker.appendChild(b);
    buttons.push(b);
  }

  const card=document.getElementById('card');
  function select(idx){
    buttons.forEach((b,i)=>b.classList.toggle('active',i===idx));
    const s=SETS[idx];
    card.classList.remove('show');
    // reflow to restart animation
    void card.offsetWidth;
    card.innerHTML=
      '<div class="set-label">'+(idx+1)+'번 질문</div>'+
      '<div class="q"><div class="no">①</div><div><span class="tag">상대에게 물어보기</span>'+s.q1+'</div></div>'+
      '<div class="q"><div class="no">②</div><div><span class="tag">내 이야기로 나누기</span>'+s.q2+'</div></div>'+
      '<button class="again" id="againBtn">↺ 다시 고르기</button>';
    card.classList.add('show');
    document.getElementById('againBtn').addEventListener('click',reset);
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  function reset(){
    buttons.forEach(b=>b.classList.remove('active'));
    card.classList.remove('show');
    void card.offsetWidth;
    card.innerHTML='<div class="placeholder">위에서 <b>1~5번</b> 중 하나를 고르면<br>질문 두 가지가 여기에 나와요.</div>';
    card.classList.add('show');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  document.getElementById('randomBtn').addEventListener('click',()=>{
    select(Math.floor(Math.random()*5));
  });
</script>
</body>
</html>
