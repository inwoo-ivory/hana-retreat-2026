<style>
  :root{
    --sky-top:#5AA0D8;
    --sky-mid:#2B8CCF;
    --sky-deep:#0D7ABE;
    --ink:#0b4b78;
    --white:#ffffff;
    --round:"Jua","Malgun Gothic",sans-serif;
    --body:"Gowun Dodum","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--body);
    color:var(--white);
    min-height:100vh;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 45%,var(--sky-deep) 100%);
    overflow-x:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 20px 80px;
  }

  /* ── 반짝이는 별 ── */
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{
    position:absolute;color:#fff;opacity:0;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.9));
    animation:twinkle var(--dur,4s) ease-in-out infinite;
    animation-delay:var(--delay,0s);
  }
  @keyframes twinkle{
    0%,100%{opacity:0;transform:scale(.6) rotate(0deg);}
    50%{opacity:.95;transform:scale(1) rotate(20deg);}
  }

  /* ── 헤더 ── */
  header{position:relative;z-index:2;text-align:center;margin-bottom:8px;}
  .badge{
    font-family:var(--round);font-size:15px;letter-spacing:1px;
    color:#eaf6ff;opacity:.95;margin-bottom:10px;
    text-shadow:0 2px 8px rgba(11,75,120,.35);
  }
  .badge .cross{margin-right:6px;}
  h1{
    font-family:var(--round);
    font-size:clamp(38px,7vw,72px);
    font-weight:400;line-height:1.15;color:#fff;
    text-shadow:0 4px 24px rgba(255,255,255,.55),0 2px 6px rgba(11,75,120,.35);
    letter-spacing:1px;
  }
  .sub{
    font-family:var(--round);
    margin-top:10px;font-size:clamp(16px,2.4vw,22px);
    color:#f0f8ff;text-shadow:0 2px 10px rgba(11,75,120,.4);
  }
  .verse{
    margin-top:14px;font-size:14px;color:#eaf6ff;opacity:.9;
    max-width:520px;margin-left:auto;margin-right:auto;line-height:1.6;
  }

  /* ── 뽑기 안내 ── */
  .prompt{
    position:relative;z-index:2;margin:34px 0 18px;text-align:center;
    font-family:var(--round);font-size:clamp(18px,3vw,24px);
    color:#fff;text-shadow:0 2px 12px rgba(11,75,120,.4);
  }

  /* ── 번호 카드 ── */
  .picker{
    position:relative;z-index:2;
    display:flex;flex-wrap:wrap;gap:16px;justify-content:center;
    max-width:560px;margin-bottom:22px;
  }
  .num{
    width:82px;height:82px;border-radius:24px;border:none;cursor:pointer;
    font-family:var(--round);font-size:34px;color:var(--ink);
    background:rgba(255,255,255,.82);
    box-shadow:0 8px 22px rgba(11,75,120,.28),inset 0 1px 0 rgba(255,255,255,.9);
    backdrop-filter:blur(4px);
    transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
  }
  .num:hover{transform:translateY(-4px) scale(1.05);background:#fff;
    box-shadow:0 14px 30px rgba(11,75,120,.4);}
  .num:active{transform:translateY(-1px) scale(1.0);}
  .num.active{background:#fff;color:var(--sky-deep);
    box-shadow:0 0 0 4px rgba(255,255,255,.55),0 14px 30px rgba(11,75,120,.45);}

  .random{
    position:relative;z-index:2;margin-bottom:8px;
    font-family:var(--round);font-size:18px;color:var(--sky-deep);
    background:rgba(255,255,255,.92);border:none;border-radius:999px;
    padding:12px 26px;cursor:pointer;
    box-shadow:0 8px 22px rgba(11,75,120,.3);
    transition:transform .18s ease,box-shadow .18s ease;
  }
  .random:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(11,75,120,.42);}

  /* ── 질문 카드 ── */
  .stage{position:relative;z-index:2;width:100%;max-width:660px;margin-top:26px;}
  .card{
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.4);
    border-radius:28px;padding:30px 26px;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 50px rgba(11,75,120,.35);
    opacity:0;transform:translateY(18px);
  }
  .card.show{animation:rise .5s ease forwards;}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .card .set-label{
    font-family:var(--round);text-align:center;font-size:20px;color:#fff;
    margin-bottom:20px;text-shadow:0 2px 10px rgba(11,75,120,.4);
  }
  .q{
    display:flex;gap:14px;align-items:flex-start;
    background:rgba(255,255,255,.9);color:var(--ink);
    border-radius:20px;padding:18px 20px;margin-bottom:14px;
    box-shadow:0 6px 18px rgba(11,75,120,.18);
    line-height:1.65;font-size:clamp(16px,2.6vw,19px);
  }
  .q:last-child{margin-bottom:0;}
  .q .no{
    flex:none;width:34px;height:34px;border-radius:50%;
    background:linear-gradient(180deg,var(--sky-mid),var(--sky-deep));
    color:#fff;font-family:var(--round);font-size:18px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(11,75,120,.3);
  }
  .q .tag{display:block;font-family:var(--round);font-size:12px;color:var(--sky-mid);
    margin-bottom:4px;letter-spacing:.5px;}

  .placeholder{
    text-align:center;color:#eaf6ff;opacity:.85;font-size:16px;
    padding:20px;line-height:1.7;
  }
  .again{
    display:block;margin:22px auto 0;font-family:var(--round);
    font-size:15px;color:#fff;background:rgba(255,255,255,.22);
    border:1px solid rgba(255,255,255,.45);border-radius:999px;
    padding:10px 24px;cursor:pointer;transition:background .18s ease;
  }
  .again:hover{background:rgba(255,255,255,.34);}

  footer{position:relative;z-index:2;margin-top:auto;padding-top:36px;
    font-size:12px;color:#eaf6ff;opacity:.7;text-align:center;}
</style>
</head>
<body>
  <div class="sky" id="sky"></div>
  <div class="cloud-band"></div>

  <header>
    <div class="badge"><span class="cross">✝</span>2026 청년마을 여름수련회</div>
    <h1>하나가 되었다는 것</h1>
    <div class="sub">07.16(목) – 18(토) · 가평</div>
    <div class="verse">"..각 사람을 그리스도 안에서 완전한 자로 세우려 함이니.." (골 1:28-29)</div>
  </header>

  <div class="prompt">번호를 하나 골라보세요 🙂</div>

  <div class="picker" id="picker"></div>
  <button class="random" id="randomBtn">🎲 랜덤으로 뽑기</button>

  <div class="stage">
    <div class="card show" id="card">
      <div class="placeholder">위에서 <b>1~5번</b> 중 하나를 고르면<br>질문 두 가지가 여기에 나와요.</div>
    </div>
  </div>

  <footer>하나가 되었다는 것 · 나눔 질문</footer>

<script>
  const SETS = [
    {
      q1:"기독교에서 말하는 구원이 뭐예요? 정확히 뭘 구원받는다는 건가요?",
      q2:"그럼 당신은 정말 당신이 구원받았다고 믿는 건가요? 그걸 어떻게 알아요?"
    },
    {
      q1:"근데 기독교는 왜 사람이 구원을 받아야 한다고 말하는거죠? 그냥 착하게 살면 안되나요?",
      q2:"그럼 구원을 받아보니 어때요? 당신은 구원 받은 거겠네요?"
    },
    {
      q1:"기독교는 왜 모든 사람이 죄인이라고 하나요? 나처럼 착하게 사는 사람도 죽으면 지옥가는 거예요?",
      q2:"그럼 당신도 자기 자신을 죄인이라고 진짜 믿나요? 왜 그렇게 생각해요?"
    },
    {
      q1:"교회를 다니려면 예수님을 믿어야 하죠? 예수님이 그냥 있다고 믿기만 하면 되나요?",
      q2:"예수님을 믿어보니까 어때요? 예수를 믿는다는 게 당신에게 실제로 어떤 의미예요?"
    },
    {
      q1:"하나님은 사랑의 하나님이라면서 죄인들을 그냥 용서해 주면 되는 거 아닌가요?",
      q2:"그럼 당신은 예수님의 십자가가 정말 당신을 위한 사건이라고 믿는 건가요? 그럼 어때요? 감사한 생각이 드나요?"
    }
  ];

  // 별 생성
  const sky = document.getElementById('sky');
  const starSVG = '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M12 0c.6 6 5.4 10.8 12 12-6.6 1.2-11.4 6-12 12-.6-6-5.4-10.8-12-12C6.6 10.8 11.4 6 12 0z"/></svg>';
  for(let i=0;i<48;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=6+Math.random()*16;
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*70+'%';
    s.style.setProperty('--dur',(2.5+Math.random()*4)+'s');
    s.style.setProperty('--delay',(Math.random()*4)+'s');
    s.innerHTML=starSVG;
    s.firstChild.setAttribute('width',size);
    s.firstChild.setAttribute('height',size);
    sky.appendChild(s);
  }

  // 번호 버튼
  const picker=document.getElementById('picker');
  const buttons=[];
  for(let i=0;i<5;i++){
    const b=document.createElement('button');
    b.className='num';b.textContent=i+1;
    b.addEventListener('click',()=>select(i));
    picker.appendChild(b);
    buttons.push(b);
  }

  const card=document.getElementById('card');
  function select(idx){
    buttons.forEach((b,i)=>b.classList.toggle('active',i===idx));
    const s=SETS[idx];
    card.classList.remove('show');
    // reflow to restart animation
    void card.offsetWidth;
    card.innerHTML=
      '<div class="set-label">'+(idx+1)+'번 질문</div>'+
      '<div class="q"><div class="no">①</div><div><span class="tag">상대에게 물어보기</span>'+s.q1+'</div></div>'+
      '<div class="q"><div class="no">②</div><div><span class="tag">내 이야기로 나누기</span>'+s.q2+'</div></div>'+
      '<button class="again" id="againBtn">↺ 다시 고르기</button>';
    card.classList.add('show');
    document.getElementById('againBtn').addEventListener('click',reset);
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  function reset(){
    buttons.forEach(b=>b.classList.remove('active'));
    card.classList.remove('show');
    void card.offsetWidth;
    card.innerHTML='<div class="placeholder">위에서 <b>1~5번</b> 중 하나를 고르면<br>질문 두 가지가 여기에 나와요.</div>';
    card.classList.add('show');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  document.getElementById('randomBtn').addEventListener('click',()=>{
    select(Math.floor(Math.random()*5));
  });
</script>
</body>
</html>
